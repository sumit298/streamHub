# backend/docker-compose.yml
services:
  mongodb:
    image: mongo:7.0
    container_name: streamhub-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      # ✅ FIX: Use environment variable
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-streamhub_secure_password_2024}
      MONGO_INITDB_DATABASE: streamhub
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    command: mongod --auth
    networks:
      - streamhub-network

  redis:
    image: redis:7-alpine
    container_name: streamhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - streamhub-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: streamhub-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      # ✅ FIX: Use environment variables
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - streamhub-network

  prometheus:
    image: prom/prometheus:latest
    container_name: streamhub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # ✅ ADD: Limit retention for development
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
    networks:
      - streamhub-network

  grafana:
    image: grafana/grafana:latest
    container_name: streamhub-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      # ✅ FIX: Use environment variables for credentials
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - streamhub-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  streamhub-network:
    driver: bridge
